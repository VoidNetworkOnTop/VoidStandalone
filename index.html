<!DOCTYPE html>
<html lang="en">

.search-icon{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

.sort-bar{display:flex;justify-content:center;gap:0.4rem;flex-wrap:wrap;margin:0 auto 2rem;max-width:700px}
.sort-btn{background:rgba(30,30,30,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:0.45rem 1rem;font-size:0.78rem;font-weight:500;color:rgba(245,245,245,0.55);cursor:pointer;transition:all 0.25s ease;white-space:nowrap;user-select:none}
.sort-btn:hover{background:rgba(45,45,45,0.7);border-color:rgba(255,255,255,0.15);color:rgba(245,245,245,0.8)}
.sort-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);color:#f5f5f5;box-shadow:0 0 12px rgba(255,255,255,0.06)}
.section-title{font-size:2rem;font-weight:700;margin-bottom:1.5rem;color:var(--text-primary)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.game-card{position:relative;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94),border-color 0.4s ease,box-shadow 0.4s ease;box-shadow:var(--shadow-sm);height:200px}
.game-card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--border-hover);box-shadow:var(--shadow-lg)}
.game-image{width:100%;height:100%;object-fit:cover;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.4s ease;border-radius:var(--radius-lg);display:block}
.game-card:hover .game-image{transform:scale(1.06);filter:brightness(0.5)}
.game-info{position:absolute;bottom:0;left:0;right:0;padding:1.25rem;background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 60%,transparent 100%);opacity:0;transform:translateY(10px);transition:opacity 0.4s ease,transform 0.4s ease;pointer-events:none;z-index:2}
.game-card:hover .game-info{opacity:1;transform:translateY(0)}
.game-title{font-size:1.1rem;font-weight:600;color:#fff;margin:0 0 0.5rem;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.8)}

.loading{text-align:center;padding:3rem;color:var(--text-secondary);font-size:1.2rem;font-weight:600}
.recently-played-section,.popular-section{margin-bottom:2.5rem;display:none}
.recently-played-section .section-title,.popular-section .section-title{font-size:1.4rem;margin-bottom:1rem}
.recently-played-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}.recently-played-grid .game-card{height:140px}
.sort-spinner{display:none;justify-content:center;align-items:center;padding:2rem 0}.sort-spinner.visible{display:flex}
.sort-spinner-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.5);margin:0 5px;animation:sb .6s ease-in-out infinite alternate}.sort-spinner-dot:nth-child(2){animation-delay:.15s}.sort-spinner-dot:nth-child(3){animation-delay:.3s}
@keyframes sb{from{transform:translateY(0);opacity:.4}to{transform:translateY(-10px);opacity:1}}
.games-grid.sort-fade{opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s}.games-grid.sort-visible{opacity:1;transform:translateY(0);transition:opacity .3s,transform .3s}
#viewer{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg-base)}#viewer iframe{width:100%;height:100%;border:none}
#closeGame{position:fixed;top:12px;right:12px;z-index:10000;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px)}#closeGame:hover{background:rgba(255,0,0,0.4);border-color:rgba(255,0,0,0.6);transform:scale(1.1)}

@media(max-width:768px){.container{padding:1rem;margin-bottom:70px}.page-title{font-size:2.5rem}.games-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}.game-card{border-radius:16px;height:180px}.game-image{border-radius:16px}.sort-bar{gap:.3rem}.sort-btn{font-size:.72rem;padding:.4rem .8rem}.search-bar{font-size:16px!important}}
@media(max-width:480px){.page-title{font-size:2rem}.games-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}.game-card{height:160px;border-radius:14px}.game-image{border-radius:14px}}
@media(hover:none) and (pointer:coarse){.game-card:hover{transform:none}.game-card:active{transform:scale(.98)}.game-card:hover .game-image{transform:none;filter:none}.game-card .game-info{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container" id="catalog">
<div class="header">
<h1 class="page-title">Game Library</h1>
<div class="search-row">
<div class="search-container">

</div>
<button class="random-btn" id="randomGameBtn" title="Random game"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="12" height="12" x="2" y="10" rx="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg></button>
</div>
<div class="sort-bar" id="sortBar">
<button class="sort-btn active" data-sort="alpha">A &mdash; Z</button>
<button class="sort-btn" data-sort="newest">Newest</button>
<button class="sort-btn" data-sort="oldest">Oldest</button>
<button class="sort-btn" data-sort="liked">Most Liked</button>
<button class="sort-btn" data-sort="disliked">Most Disliked</button>
<button class="sort-btn" data-sort="mostplayed">Most Played</button>
<button class="sort-btn" data-sort="leastplayed">Least Played</button>
</div>
</div>
<div class="loading" id="loadingMessage">Loading games...</div>
<div id="recentlyPlayedSection" class="recently-played-section">
<h2 class="section-title">Continue Playing</h2>
<div id="recentlyPlayedGrid" class="recently-played-grid"></div>
</div>
<div id="popularSection" class="popular-section">
<h2 class="section-title">Popular Games</h2>
<div id="popularGrid" class="games-grid"></div>
<div class="pop-divider"><span>End of Popular Games</span></div>
</div>
<div class="games-section" id="gamesSection" style="display:none">
<h2 class="section-title">All Games</h2>
<div class="sort-spinner" id="sortSpinner"><div class="sort-spinner-dot"></div><div class="sort-spinner-dot"></div><div class="sort-spinner-dot"></div></div>
<div class="games-grid sort-visible" id="gamesGrid"></div>
</div>
<div class="no-results" id="noResults"><h2>No games found</h2><p>Try a different search term.</p></div>
</div>
<div id="viewer">
<iframe id="gameFrame" allow="accelerometer;gamepad;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen" allowfullscreen></iframe>
<button id="closeGame">&times;</button>
</div>
